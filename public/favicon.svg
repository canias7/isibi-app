<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7B2D8E"/>
      <stop offset="50%" stop-color="#4A0E6B"/>
      <stop offset="100%" stop-color="#2D0845"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFC200"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <!-- Shine effects -->
    <linearGradient id="shine1" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- Gold outer ring - fills the entire viewBox -->
  <circle cx="50" cy="50" r="49" fill="url(#gold)" />
  
  <!-- Purple inner circle -->
  <circle cx="50" cy="50" r="41" fill="url(#purple)" />
  
  <!-- Vertical gold bar -->
  <rect x="46" y="6" width="8" height="88" rx="2" fill="url(#goldBar)" />
  
  <!-- Diagonal shine lines on left half -->
  <line x1="15" y1="25" x2="42" y2="70" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="20" y1="20" x2="44" y2="60" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="25" y1="30" x2="44" y2="75" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Diagonal shine lines on right half -->
  <line x1="56" y1="25" x2="82" y2="65" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="58" y1="35" x2="80" y2="72" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="60" y1="20" x2="85" y2="60" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Top highlight on gold ring -->
  <path d="M 25 15 A 42 42 0 0 1 75 15" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>